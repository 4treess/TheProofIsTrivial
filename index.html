<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Proof Is Trivial</title>
    <script type="text/babel">
    const username = "Every Math Profs Worst Nightmare";
    
    function App(){
        const [status, setStatus] = React.useState("Idle"); 

        function AddProof() {
            const [proof, setProof] = React.useState([]); 
            

            function handleChange(e){
                setProof(e.target.value);
            }

            async function sendProofToPython(e){
                e.preventDefault();
                let tempData = 0;

                try {
                    const response = await fetch('http://localhost:8000/Proof', {method: "POST", headers: {'Content-Type': "application/json"}, body: JSON.stringify({"proposition": proof, "result": "", "creator": username})});
                    if(response.ok){
                        tempData = await response.json();
                        console.log("Retrieved The following from the server: ", tempData);
                    } else {
                        console.error("Error Connecting to server: ", response.status);
                    }
                } catch (error) {
                    console.error("Could not connect to the server! ", error);
                }

                if (tempData == true){
                    setStatus("Successfully Added the Proof to the database!");
                }else{
                    setStatus("Error! Could not add the Proof to the database!");
                }
                return tempData

            }

            return (
            <div>
                <form onSubmit={sendProofToPython}>
                    <label> Enter Your Proposition Here:
                        <input type="text" value={proof} onChange={handleChange}/>
                    </label>
                </form>
            </div>    
            )
        }


        function AddUser() {
            const [user, setUser] = React.useState([]);

            function handleChange(e){
                setUser(e.target.value);
            }

            async function sendUserDataToPython(e){
                e.preventDefault();
                let tempData = 0;

                try {
                    const response = await fetch('http://localhost:8000/AddUser', {method: "POST", headers: {'Content-Type': "application/json"}, body: JSON.stringify({"username": user})});
                    if(response.ok){
                        tempData = await response.json();
                        console.log("Retrieved The following from the server: ", tempData);
                    } else {
                        console.error("Error Connecting to server: ", response.status);
                    }
                } catch (error) {
                    console.error("Could not connect to the server! ", error);
                }

                if (tempData == true){
                    setStatus("Successfully Added the User to the database!");
                }else{
                    setStatus("Error! Could not add the User to the database!");
                }
                return tempData

            }



            return (
            <div>
                <form onSubmit={sendUserDataToPython}>
                    <label> Enter Your Username:
                        <input type="text" value={user} onChange={handleChange}/>
                    </label>
                </form>
            </div>
            )
        }



        function GetProof() {
            const [proof, getProof] = React.useState([]);
            const [proposition, getProposition] = React.useState("");

            function handleChange(e){
                getProposition(e.target.value);
            }

            async function getWebData(e){
                e.preventDefault();

                try {
                    const response = await fetch(`http://localhost:8000/Proof/${proposition}`, {method: "GET"});
                    if(response.ok){
                        let tempData = await response.json();
                        getProof(tempData);
                        console.log("Retrieved The following from the server: ", tempData);
                    } else {
                        console.error("Error Connecting to server: ", response.status);
                    }
                } catch (error) {
                    console.error("Could not connect to the server! ", error);
                }
            }

            return (
                <div>
                    <form onSubmit={getWebData}>
                        <label> Enter The Proposition To Retrieve:
                            <input type="text" value={proposition} onChange={handleChange}/>
                        </label>
                    </form> 
                    {proof.map((item, index) => (<p key = {index}>Claim: {item.proposition}<br/>Proof: {item.result}</p>))}
                </div>
            )
        }


        function GetProofs() {
            const [proof, getProofs] = React.useState([]);

            async function getWebData(e){
                e.preventDefault();

                try {
                    const response = await fetch(`http://localhost:8000/Proofs/${username}`, {method: "GET"});
                    if(response.ok){
                        let tempData = await response.json();
                        getProofs(tempData);
                        console.log("Retrieved The following from the server: ", tempData);
                    } else {
                        console.error("Error Connecting to server: ", response.status);
                    }
                } catch (error) {
                    console.error("Could not connect to the server! ", error);
                }

            }

            return (
                <div>
                    <button onClick={getWebData}>Click To Retrieve Your Proofs</button>
                    {proof.map((item, index) => (<p key = {index}>Proof #{index + 1}:<br/>Claim: {item.proposition}<br/> Proof: {item.result}</p>))}
                </div>
            )
        }





        function DelProof() {
            const [proof, delProof] = React.useState([]);

            function handleChange(e){
                delProof(e.target.value);
            }

            async function sendProofToPython(e){
                e.preventDefault();
                let tempData = 0;

                try {
                    const response = await fetch('http://localhost:8000/DelProof', {method: "POST", headers: {'Content-Type': "application/json"}, body: JSON.stringify({"proposition": proof, "result": "", "creator": username})});
                    if(response.ok){
                        tempData = await response.json();
                        console.log("Retrieved The following from the server: ", tempData);
                    } else {
                        console.error("Error Connecting to server: ", response.status);
                    }
                } catch (error) {
                    console.error("Could not connect to the server! ", error);
                }

                if (tempData == true){
                    setStatus("Successfully Deleted the Proof from the database!");
                }else{
                    setStatus("Error! Could not delete the Proof from the database!");
                }
                return tempData

            }

            return (
            <div>
                <form onSubmit={sendProofToPython}>
                    <label> Enter The Proposition of the Proof You Want To Delete Here:
                        <input type="text" value={proof} onChange={handleChange}/>
                    </label>
                </form>
            </div>    
            )
        }


        function DelUser() {
            const [user, delUser] = React.useState([]);

            function handleChange(e){
                delUser(e.target.value);
            }

            async function sendProofToPython(e){
                e.preventDefault();
                let tempData = 0;

                try {
                    if(user == username){
                        tempData = false
                    }else{
                        const response = await fetch('http://localhost:8000/DelUser', {method: "POST", headers: {'Content-Type': "application/json"}, body: JSON.stringify({"username": user})});
                        if(response.ok){
                            tempData = await response.json();
                            console.log("Retrieved The following from the server: ", tempData);
                        } else {
                            console.error("Error Connecting to server: ", response.status);
                        }
                    }
                } catch (error) {
                    console.error("Could not connect to the server! ", error);
                }

                if (tempData == true){
                    setStatus("Successfully Deleted the User from the database!");
                }else{
                    setStatus("Error! Could not delete the User from the database!");
                }
                return tempData

            }

            return (
            <div>
                <form onSubmit={sendProofToPython}>
                    <label> Enter The Username of the User You Want To Delete Here:
                        <input type="text" value={user} onChange={handleChange}/>
                    </label>
                </form>
                <p>Status: {status}</p>
            </div>    
            )
        }


        return (        
        <div>
            <AddUser/> <br/>
            <AddProof/> <br/>
            <GetProofs/> <br/>
            <GetProof/> <br/>
            <DelProof/> <br/>
            <DelUser/> <br/>
        </div>)

    }



    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>) 
    </script>
</body>
</html>
